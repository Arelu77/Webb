<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background:#1a1a1a;color:#fff;text-align:center;padding:50px;font-family:sans-serif">
    <h2>Тест отправки данных</h2>
    <input type="text" id="testInput" placeholder="Введи что-нибудь" style="padding:10px;width:80%;margin:10px;border-radius:8px;border:none">
    <br>
    <button onclick="send()" style="padding:12px 30px;background:#2aabee;color:#fff;border:none;border-radius:8px;font-size:16px">Отправить</button>
    <p id="status"></p>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        document.getElementById('status').textContent = 'WebApp готов. Версия: ' + tg.version;
        
        function send(){
            const val = document.getElementById('testInput').value;
            if(!val) return;
            
            document.getElementById('status').textContent = 'Отправляю: ' + val;
            
            tg.sendData(JSON.stringify({
                action: 'test',
                data: val
            }));
            
            document.getElementById('status').textContent = 'Отправлено: ' + val;
        }
    </script>
</body>
</html>
